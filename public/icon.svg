<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#007bff" rx="40"/>
  
  <!-- Calendar grid -->
  <g fill="white" opacity="0.9">
    <!-- Top bar -->
    <rect x="32" y="48" width="128" height="16" fill="white"/>
    
    <!-- Grid lines -->
    <line x1="32" y1="80" x2="160" y2="80" stroke="white" stroke-width="2"/>
    <line x1="32" y1="108" x2="160" y2="108" stroke="white" stroke-width="2"/>
    <line x1="32" y1="136" x2="160" y2="136" stroke="white" stroke-width="2"/>
    
    <!-- Vertical lines -->
    <line x1="62" y1="64" x2="62" y2="152" stroke="white" stroke-width="2"/>
    <line x1="92" y1="64" x2="92" y2="152" stroke="white" stroke-width="2"/>
    <line x1="122" y1="64" x2="122" y2="152" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Day numbers -->
  <text x="48" y="100" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="78" y="100" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="108" y="100" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="138" y="100" font-size="16" font-weight="bold" fill="white" text-anchor="middle">4</text>
</svg>
